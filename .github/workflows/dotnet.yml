name: .NET

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore MyApplication.sln

    - name: Build
      run: dotnet build MyApplication.sln --no-restore --configuration Release

    - name: Test
      run: dotnet test MyApplication.sln --no-build --configuration Release --verbosity normal
